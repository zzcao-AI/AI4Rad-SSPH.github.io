<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI4Rad Lab member profile.">
  <title>Member · AI4Rad Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="../images/brand/ai4rad-emblem.svg">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    .mp-profile { display: grid; grid-template-columns: 1fr 220px; gap: 48px; align-items: start; padding: 48px 0 32px; }
    .mp-photo { width: 100%; aspect-ratio: 3/4; object-fit: cover; border-radius: var(--radius-md); border: 1px solid var(--border); }
    .mp-avatar-fallback { width: 100%; aspect-ratio: 3/4; border-radius: var(--radius-md); background: var(--ai4rad-teal-soft); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
    .mp-avatar-fallback .avatar-ph { font-size: 2.6rem; border-radius: var(--radius-md); }
    .mp-back { display: inline-flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 500; color: var(--text-muted); margin-bottom: 20px; }
    .mp-back:hover { color: var(--text-primary); }
    .mp-name { font-family: var(--font-display); font-size: 2.2rem; font-weight: 600; line-height: 1.15; color: var(--text-primary); margin-bottom: 4px; }
    .mp-name-sub { font-size: 1rem; color: var(--text-secondary); margin-left: 8px; }
    .mp-title { font-size: 0.78rem; font-weight: 600; color: var(--ai4rad-teal-dark); text-transform: uppercase; letter-spacing: 0.06em; margin: 8px 0 14px; }
    .mp-bio { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.75; }
    .mp-contacts { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; font-size: 0.88rem; font-weight: 500; }
    .mp-interests { list-style: none; padding: 0; margin: 0; }
    .mp-interests li { position: relative; padding: 7px 0 7px 18px; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; }
    .mp-interests li::before { content: '—'; position: absolute; left: 0; color: var(--ai4rad-teal); font-weight: 500; }
    .news-list { list-style: none; padding: 0; margin: 0; }
    .news-list li { padding: 8px 0; color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; border-bottom: 1px solid var(--border-light); }
    .news-list li:last-child { border-bottom: none; }
    .news-list .date { display: inline-block; min-width: 64px; font-weight: 500; color: var(--text-primary); margin-right: 10px; }
    .pub-list { list-style: none; padding: 0; margin: 0; }
    .pub-item { padding: 16px 0; border-bottom: 1px solid var(--border-light); }
    .pub-item:last-child { border-bottom: none; }
    .pub-title { font-size: 0.95rem; font-weight: 600; line-height: 1.45; color: var(--text-primary); margin-bottom: 4px; }
    .pub-title a { color: inherit; }
    .pub-title a:hover { color: var(--ai4rad-teal-dark); }
    .pub-authors { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; }
    .pub-venue { font-size: 0.82rem; font-style: italic; color: var(--text-muted); margin-top: 2px; }
    .pub-links { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; }
    .pub-links a { font-size: 0.78rem; font-weight: 500; color: var(--text-muted); }
    .pub-links a:hover { color: var(--text-primary); }
    .mp-list { list-style: none; padding: 0; margin: 0; }
    .mp-list li { position: relative; padding: 7px 0 7px 18px; color: var(--text-secondary); font-size: 0.88rem; line-height: 1.6; }
    .mp-list li::before { content: '—'; position: absolute; left: 0; color: var(--ai4rad-teal); font-weight: 500; }
    .mp-empty { text-align: center; color: var(--text-muted); padding: 80px 0; }
    @media (max-width: 768px) {
      .mp-profile { grid-template-columns: 1fr; gap: 28px; padding: 32px 0 20px; }
      .mp-photo-wrap { order: -1; max-width: 180px; margin: 0 auto; }
      .mp-name { font-size: 1.8rem; text-align: center; }
      .mp-name-sub { display: block; margin: 4px 0 0; text-align: center; }
      .mp-title, .mp-contacts { justify-content: center; text-align: center; }
      .mp-bio { text-align: center; }
      .mp-avatar-fallback .avatar-ph { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a href="../" class="nav__brand">
        <img src="../images/brand/ai4rad-emblem.svg" alt="AI4Rad" class="nav__brand-logo">
        <span class="nav__brand-text">AI4Rad Lab</span>
      </a>
      <div class="nav__links">
        <a href="../" class="nav__link">Home</a>
        <a href="../team.html" class="nav__link">Team</a>
        <a href="../" id="langToggle" class="nav__link--lang">中文</a>
      </div>
      <button class="nav__theme-btn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    </div>
  </nav>

  <main class="wrapper">
    <div id="mp-root">
      <p class="mp-empty">Loading…</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__brand">
      <img src="../images/brand/ai4rad-logo-full.svg" alt="AI4Rad Lab" class="footer__brandlogo">
    </div>
    <div class="footer__links">
      <a href="../">Home</a>
      <a href="../team.html">Team</a>
      <a href="https://github.com/AI4Rad-SSPH" target="_blank" rel="noopener">GitHub</a>
    </div>
    <p class="footer__meta">AI4Rad Lab · Department of Radiology · Shanghai Sixth People's Hospital · &copy; 2026</p>
    <div class="footer__affil">
      <span class="footer__affil-cap">Affiliated with</span>
      <img src="../images/brand/ssph-med-logo.svg" alt="Shanghai Sixth People's Hospital" class="a-ssph">
      <img src="../images/brand/sjtu-logo-en.svg" alt="Shanghai Jiao Tong University" class="a-sjtu">
    </div>
  </footer>

  <script src="../js/main.js"></script>
  <script>
  (function(){
    var params = new URLSearchParams(location.search);
    var id = (params.get('id') || '').replace(/[^a-z0-9\-]/gi, '');
    var lang = params.get('lang') === 'cn' ? 'cn' : 'en';
    var root = document.getElementById('mp-root');

    var lt = document.getElementById('langToggle');
    lt.textContent = lang === 'cn' ? 'EN' : '中文';
    lt.setAttribute('href', '?id=' + id + (lang === 'cn' ? '' : '&lang=cn'));

    function t(en, cn){ return lang === 'cn' ? cn : en; }
    function asset(p){ if (!p) return ''; return /^(https?:|data:)/.test(p) ? p : '../' + p; }
    function esc(s){ return String(s == null ? '' : s); }

    function memberInitials(m) {
      var name = lang === 'cn' ? m.name_cn : m.name_en;
      if (!name) name = lang === 'cn' ? m.name_en : m.name_cn;
      if (!name) return '?';
      name = name.trim();
      if (/^[\u4e00-\u9fa5]+$/.test(name)) {
        if (name.length >= 2) return name.slice(-2);
        return name;
      }
      var parts = name.split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[parts.length - 1][0]).toUpperCase();
      return name.substring(0, 2).toUpperCase();
    }

    function renderPhoto(m) {
      if (m.photo) return '<img class="mp-photo" src="' + asset(m.photo) + '" alt="' + esc(t(m.name_en, m.name_cn)) + '" loading="lazy">';
      return '<div class="mp-avatar-fallback"><div class="avatar-ph" aria-hidden="true">' + memberInitials(m) + '</div></div>';
    }

    if (!id) { root.innerHTML = '<p class="mp-empty">' + t('No member specified.', '未指定成员。') + ' <a href="../team.html">' + t('Back to the team page →', '返回团队页面 →') + '</a></p>'; return; }

    fetch('../data/members/' + id + '.json')
      .then(function(r){ if (!r.ok) throw new Error('not found'); return r.json(); })
      .then(function(m){ render(m); })
      .catch(function(){
        root.innerHTML = '<p class="mp-empty">' + t('This member has not set up a profile page yet.', '该成员尚未创建个人页面。') + '<br><a href="../team.html">' + t('Back to the team page →', '返回团队页面 →') + '</a></p>';
      });

    function sectionHead(title){
      return '<h2 class="section-title" style="margin-top:48px;">' + title + '</h2>';
    }

    function render(m){
      var name = t(m.name_en, m.name_cn);
      var other = t(m.name_cn, m.name_en);
      document.title = name + ' · AI4Rad Lab';
      var L = m.links || {};
      var html = '';

      html += '<section class="mp-profile reveal">';
      html += '<div>';
      html += '<a href="../team.html" class="mp-back">← ' + t('Team', '团队') + '</a>';
      html += '<h1 class="mp-name">' + name + '<span class="mp-name-sub">' + esc(other) + '</span></h1>';
      if (m.title_en || m.title_cn) html += '<p class="mp-title">' + esc(t(m.title_en, m.title_cn)) + '</p>';
      if (m.bio_en || m.bio_cn) html += '<p class="mp-bio">' + t(m.bio_en, m.bio_cn) + '</p>';
      html += '<div class="mp-contacts">';
      if (L.email) html += '<a href="mailto:' + L.email + '">' + t('Email', '邮箱') + '</a>';
      if (L.scholar) html += '<a href="' + L.scholar + '" target="_blank" rel="noopener">Google Scholar</a>';
      if (L.github) html += '<a href="' + L.github + '" target="_blank" rel="noopener">GitHub</a>';
      if (L.homepage) html += '<a href="' + L.homepage + '" target="_blank" rel="noopener">' + t('Homepage', '个人主页') + '</a>';
      html += '</div></div>';
      html += '<div class="mp-photo-wrap">' + renderPhoto(m) + '</div></section>';

      var interests = t(m.interests_en, m.interests_cn);
      if (interests && interests.length) {
        html += '<section class="reveal">' + sectionHead(t('Research', '研究方向'));
        html += '<ul class="mp-interests">' + interests.map(function(x){ return '<li>' + x + '</li>'; }).join('') + '</ul></section>';
      }

      var news = t(m.news_en, m.news_cn);
      if (news && news.length) {
        html += '<section class="reveal">' + sectionHead(t('News', '最新动态'));
        html += '<ul class="news-list">' + news.map(function(n){
          return '<li><span class="date">' + esc(n.date) + '</span>' + n.text + '</li>';
        }).join('') + '</ul></section>';
      }

      if (m.publications && m.publications.length) {
        html += '<section class="reveal">' + sectionHead(t('Publications', '论文成果'));
        html += '<ul class="pub-list">';
        m.publications.forEach(function(group){
          if (group.group_en || group.group_cn) html += '<li class="mp-group-label" style="list-style:none;padding-left:0;margin:16px 0 8px;">' + esc(t(group.group_en, group.group_cn)) + '</li>';
          (group.items || []).forEach(function(p){
            html += '<li class="pub-item">';
            var titleInner = (p.featured ? '<span class="pub-featured">' + t('Featured', '代表作') + '</span>' : '') + esc(p.title);
            html += '<div class="pub-title">' + (p.url ? '<a href="' + p.url + '" target="_blank" rel="noopener">' + titleInner + '</a>' : titleInner) + '</div>';
            if (p.authors) html += '<div class="pub-authors">' + p.authors + '</div>';
            if (p.venue) html += '<div class="pub-venue">' + esc(p.venue) + '</div>';
            if (p.links && p.links.length) html += '<div class="pub-links">' + p.links.map(function(lk){ return '<a href="' + lk.url + '" target="_blank" rel="noopener">' + esc(lk.label) + '</a>'; }).join('') + '</div>';
            html += '</li>';
          });
        });
        html += '</ul></section>';
      }

      var awards = t(m.awards_en, m.awards_cn);
      if (awards && awards.length) {
        html += '<section class="reveal">' + sectionHead(t('Honors & Awards', '荣誉奖项'));
        html += '<ul class="mp-list">' + awards.map(function(a){ return '<li>' + a + '</li>'; }).join('') + '</ul></section>';
      }

      var services = t(m.services_en, m.services_cn);
      if (services && services.length) {
        html += '<section class="reveal">' + sectionHead(t('Academic Services', '学术服务'));
        html += '<ul class="mp-list">' + services.map(function(s){ return '<li>' + s + '</li>'; }).join('') + '</ul></section>';
      }

      root.innerHTML = html;
      if (lang === 'cn') document.documentElement.setAttribute('lang', 'zh-CN');

      var obs = new IntersectionObserver(function(entries){
        entries.forEach(function(e){ if (e.isIntersecting) e.target.classList.add('visible'); });
      }, { threshold: 0.05 });
      root.querySelectorAll('.reveal').forEach(function(el){ obs.observe(el); });
    }
  })();
  </script>
</body>
</html>
