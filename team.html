<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="AI4Rad Lab team members — leader, principal investigators, postdocs, doctoral and master students, and alumni.">
  <title>Team · AI4Rad Lab</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="images/brand/ai4rad-emblem.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="nav">
    <div class="nav__inner">
      <a href="./" class="nav__brand">
        <img src="images/brand/ai4rad-emblem.svg" alt="AI4Rad" class="nav__brand-logo">
        <span class="nav__brand-text">AI4Rad Lab</span>
      </a>
      <div class="nav__links">
        <a href="./" class="nav__link">Home</a>
        <a href="./team.html" class="nav__link active">Team</a>
        <a href="https://scholar.google.com/citations?user=zj4WqewAAAAJ" class="nav__link" target="_blank" rel="noopener">Publications</a>
        <a href="mailto:zhangrp@sjtu.edu.cn" class="nav__link">Contact</a>
        <a href="./team_ch.html" class="nav__link--lang">中文</a>
      </div>
      <button class="nav__theme-btn" id="themeToggle" aria-label="Toggle dark mode" title="Toggle dark mode"></button>
    </div>
  </nav>

  <main class="wrapper">
    <section class="hero reveal">
      <h1 class="hero__title">Team</h1>
      <p class="hero__subtitle">Clinicians, engineers, and students working on medical imaging AI.</p>
    </section>

    <div id="team-content">
      <p style="text-align:center;color:var(--text-muted);padding:40px 0;">Loading team data...</p>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__brand">
      <img src="images/brand/ai4rad-logo-full.svg" alt="AI4Rad Lab" class="footer__brandlogo">
    </div>
    <div class="footer__links">
      <a href="./">Home</a>
      <a href="./team.html">Team</a>
      <a href="https://scholar.google.com/citations?user=zj4WqewAAAAJ" target="_blank" rel="noopener">Publications</a>
      <a href="mailto:zhangrp@sjtu.edu.cn">Email</a>
      <a href="https://github.com/AI4Rad-SSPH" target="_blank" rel="noopener">GitHub</a>
    </div>
    <p class="footer__meta">AI4Rad Lab · Department of Radiology · Shanghai Sixth People's Hospital · &copy; 2026</p>
    <div class="footer__affil">
      <span class="footer__affil-cap">Affiliated with</span>
      <img src="images/brand/ssph-med-logo.svg" alt="Shanghai Sixth People's Hospital" class="a-ssph">
      <img src="images/brand/sjtu-logo-en.svg" alt="Shanghai Jiao Tong University" class="a-sjtu">
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    (function(){
      fetch('data/team.json')
        .then(function(r){ return r.json(); })
        .then(function(data){ renderTeam(data, 'en'); })
        .catch(function(e){
          document.getElementById('team-content').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px 0;">Failed to load team data. Please refresh.</p>';
          console.error(e);
        });
    })();
  </script>
</body>
</html>
